version: 2

# Sources point to Parquet files in MinIO (S3-compatible).
sources:
  - name: flights_raw
    tables:
      - name: lnd_flights

  - name: openflights_raw
    tables:
      - name: lnd_airlines
      - name: lnd_airports
      - name: lnd_routes
      - name: lnd_planes
      - name: lnd_countries

  # Materialized tables in DuckDB (used as sources for downstream models)
  - name: analytics
    schema: main
    tables:
      - name: fct_flights
